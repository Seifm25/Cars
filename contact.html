        <img src="imgs/dark_mode_24dp_E3E3E3_FILL1_wght400_GRAD0_opsz24.png" class="dark-icon" alt="darkMode">
        <img src="imgs/light_mode_24dp_E3E3E3_FILL1_wght400_GRAD0_opsz24 (1).png" class="light-icon" alt="lightMode">
    </button>
    <header>
        <div class="menu" id="menu-icon" onclick="toggleMenu(event)">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <nav id="nav-links" class="nav-links">
            <a href="login.html">Home</a>
            <div class="dropdown">
                <a href="javascript:void(0)" class="dropbtn" onclick="toggleCars(event)">Cars ▾</a>
                <div id="cars-dropdown" class="dropdown-content">
                    <a href="#">BMW</a>
                <a href="#">Mercedes</a>
                <a href="#">Audi</a>
                <a href="#">Porsche</a>
                </div>

            <a href="about.html">About</a>
            <a href="contact.html">Contact us</a>

<div class="contact-container">
                <div class="contact-info">
            <span class="badge">Contact us</span>
            <h1>Let's keep in touch</h1>
            <p>Or you can contact us manually via<a href="">emaiil@.com</a></p>
        </div>

        <div class="contact-form-container">
            <form class="contact-form">
                <div class="input-group">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <i class="far fa-user"></i>
                        <input type="text" placeholder="Write your full name here....">
                    </div>
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="far fa-envelope"></i>
                        <input type="email" placeholder="Write your Email....">
                    </div>
                </div>

                <div class="input-group">
                    <label>Phone Number</label>
                    <div class="input-wrapper phone-input">
                        <input type="tel" placeholder="+20----------">
                    </div>
                </div>

                <div class="input-group">
                    <label>The Message</label>
                    <textarea placeholder="Write Your Message..... " maxlength="300"></textarea>
                    <span class="char-count">300/300</span>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="privacy" required="">
        <label for="privacy">I agree to the terms
        <span>Privacy Policy</span>.</label>
                </div>

 <button type="submit" class="submit-btn"> Send </button>
       </form>
        </div>
    </div>
    <script src="contact us.js"></script>
<script src="globe.js"></script>
<script src="scriptHome.js"></script>
