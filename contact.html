<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact</title>
<link href="globe.css" rel="stylesheet">
<link rel="stylesheet" href="contact.css">
</head>

<body>

    <button id="theme-switch">
        <img src="imgs/dark_mode_24dp_E3E3E3_FILL1_wght400_GRAD0_opsz24.png" class="dark-icon" alt="darkMode">
        <img src="imgs/light_mode_24dp_E3E3E3_FILL1_wght400_GRAD0_opsz24 (1).png" class="light-icon" alt="lightMode">
    </button>
<!-- 🔥 Intro -->
<section class="intro">
    <video autoplay muted playsinline id="carVideo">
        <source src="316190.mp4" type="video/mp4">
    </video>

    <!-- 🌫️ Smoke Layer -->
    <div class="smoke"></div>
</section>

<!-- 📩 Contact -->
<section class="contact" id="contact">
    <form>
        <h2>Contact Us</h2>
        <input type="text" placeholder="Name">
        <input type="email" placeholder="Email">
        <textarea placeholder="Message"></textarea>
        <button>Send</button>
    </form>
</section>

<script src="contact us.js"></script>
<script src="globe.js"></script>
</body>
</html>
