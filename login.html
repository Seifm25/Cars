<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" />
    <title>Home</title>
    <style>
         .bar {
            height: 4px;
            background-color: #333;
            margin: 6px 0px;
            transition: 4s;
        }

        .navbar {
            flex-direction: column;
            background-color: #c13d51;
            width: 200px;
            position: absolute;
            top: 60px;
        }

        .navbar .active {
            display: flex;
        }

        .navbar a {
            padding: 15px;
            text-decoration: none;
            color: black;
        }

        .navbar-links {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            background-color: aliceblue;
            min-width: 160px;
            font-size: 10px;
            z-index: 1;
            border-radius: 4px;
        }

        .dropdown-content a {
            color: black;
            padding: 12px 16px;
            display: block;
            text-align: left;
        }

        dropdown:hover .dropdown-content {
            display: block;

        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="navbar__container">
            <a href="/" id="navbar__logo">More</a>

            <div class="navbar__toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>

            <ul class="navbar__menu">
                <li class="navbar__item">
                    <a href="#" class="navbar__links">Home</a>
                </li>

                <li class="navbar__item dropdown">
                    <div class="navbar-links" id="cars-btn">
                        cars <span class="arrows">▼</span>
                    </div>
                    <ul class="dropdown-content" id="cars-dropdown">
                        <li><a href="#">BMW</a></li>
                        <li><a href="#">Lamborghini</a></li>
                        <li><a href="#">Ferrari</a></li>
                        <li><a href="#">Porsch</a></li>
                    </ul>
                </li>
                <li class="navbar__item">
                    <a href="#" class="navbar__links">Sign_In</a>
                </li>

                <li class="navbar__item">
                    <a href="#" class="navbar__links">Contact_us</a>
                </li>
                <li class="navbar__item">
                    <a href="#" class="navbar__links">About_Us</a>
                </li>
                <li class="navbar__item">
                    <a href="#" class="navbar__links"></a>
                </li>
            </ul>
        </div>
    </nav>
    <script>function toggleMenu() {
            const menu = document.getElementById('nav-menu');
            menu.classList.toggle('active');
        }
    </script>
</body>
<footer>
    
</footer>

</html>
